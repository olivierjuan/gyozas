site_name: Gyozas
site_description: Pure-Python RL library for combinatorial optimization
site_url: https://olivierjuan.github.io/gyozas/
repo_url: https://github.com/olivierjuan/gyozas
repo_name: olivierjuan/gyozas

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/gyozas.png
  favicon: assets/gyozas.png
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Examples:
    - Branching Agent: examples/branching.md
    - Node Selection Agent: examples/node-selection.md
  - Migrating from Ecole: migrating-from-ecole.md
  - API Reference:
    - Environment: api/environment.md
    - Gymnasium Wrapper: api/gymnasium-wrapper.md
    - Dynamics: api/dynamics.md
    - Rewards: api/rewards.md
    - Observations: api/observations.md
    - Information Functions: api/informations.md
    - Instance Generators: api/instances.md
    - Instance Modifiers: api/modifiers.md
